name: inspire_me
description: "InspireMe ✨ — A beautiful motivational quotes app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.6.6

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Networking
  http: ^1.4.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.7
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.3.5
  google_sign_in: ^6.2.2

  # UI & Animations
  flutter_animate: ^4.5.2
  share_plus: ^10.1.4
  audioplayers: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

